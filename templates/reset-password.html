<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Reset Password - Phishing Detection</title>

    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700&display=swap" rel="stylesheet">
    <style>
        body { margin: 0; font-family: 'Orbitron', sans-serif; background: linear-gradient(135deg, #0f2027, #203a43, #2c5364); height: 100vh; display: flex; justify-content: center; align-items: center; }
        .card { background: rgba(0,0,0,0.6); backdrop-filter: blur(10px); padding: 40px; border-radius: 15px; box-shadow: 0 0 30px #00ffcc; width: 380px; text-align: center; color: white; }
        h2 { margin-bottom: 20px; color: #00ffcc; }
        input { width: 100%; padding: 12px; margin-bottom: 15px; border-radius: 8px; border: none; outline: none; }
        button { width: 100%; padding: 12px; border-radius: 8px; border: none; background: #00ffcc; color: black; font-weight: bold; cursor: pointer; transition: 0.3s; }
        button:hover { background: #00ccaa; }
        a { color: #00ffcc; text-decoration: none; }
        .alert-container { margin-bottom: 12px; text-align: left; }
        .alert { padding: 10px 14px; border-radius: 8px; margin-bottom: 8px; font-size: 0.9rem; }
        .alert-success { background: rgba(0,255,170,0.15); color: #8affc8; border: 1px solid #00ffa5; }
        .alert-danger { background: rgba(255,80,80,0.18); color: #ffb3b3; border: 1px solid #ff3d3d; }
    </style>
</head>
<body>
<div class="card">
    <h2>🔑 Password Reset</h2>
    {% with messages = get_flashed_messages(with_categories=true) %}
      {% if messages %}
        <div class="alert-container">
          {% for category, message in messages %}
            <div class="alert {{ 'alert-success' if category == 'success' else 'alert-danger' }}">{{ message }}</div>
          {% endfor %}
        </div>
      {% endif %}
    {% endwith %}

    <form method="POST" id="resetForm">
        <input type="email" name="email" placeholder="Registered email" required>
        <button type="submit">Send Reset Link</button>
    </form>

    <p>Remembered your password? <a href="{{ url_for('login') }}">Login</a></p>
</div>
</body>
</html>

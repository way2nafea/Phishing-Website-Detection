<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Register - Phishing Detection</title>

    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700&display=swap" rel="stylesheet">

    <style>
        body {
            margin: 0;
            font-family: 'Orbitron', sans-serif;
            background: linear-gradient(135deg, #1f4037, #99f2c8);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .card {
            background: rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(10px);
            padding: 40px;
            border-radius: 15px;
            box-shadow: 0 0 30px #00ffcc;
            width: 350px;
            text-align: center;
            color: white;
        }

        h2 {
            margin-bottom: 30px;
            color: #00ffcc;
        }

        input {
            width: 100%;
            padding: 12px;
            margin-bottom: 15px;
            border-radius: 8px;
            border: none;
            outline: none;
        }

        button {
            width: 100%;
            padding: 12px;
            border-radius: 8px;
            border: none;
            background: #00ffcc;
            color: black;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
        }

        button:hover {
            background: #00ccaa;
        }

        a {
            color: #00ffcc;
            text-decoration: none;
        }

        p {
            margin-top: 15px;
        }

        .social-login {
            margin-top: 14px;
        }

        .social-login p {
            color: #022b3a;
            margin-bottom: 8px;
        }

        .social-btn {
            width: 100%;
            border: none;
            border-radius: 8px;
            margin-bottom: 8px;
            padding: 10px;
            font-weight: bold;
            color: #fff;
            cursor: pointer;
            box-shadow: 0 0 8px rgba(0,0,0,0.25);
        }

        .social-btn.google { background: #dd4b39; }
        .social-btn.facebook { background: #3b5998; }
    </style>
</head>

<body>

<div class="card">
    <h2>📝 Create Account</h2>

    <form method="POST" id="registerForm">
        <input type="text" id="username" name="username" placeholder="Username" required>
        <input type="email" id="email" name="email" placeholder="Email" required>
        <input type="password" id="password" name="password" placeholder="Password (min 8 chars)" required>
        <button type="submit">Register</button>
    </form>

    <div class="social-login">
        <p>or sign up with</p>
        <button type="button" class="social-btn google" onclick="window.location='{{ url_for('login_google') }}'">Continue with Google</button>
        <button type="button" class="social-btn facebook" onclick="window.location='{{ url_for('login_facebook') }}'">Continue with Facebook</button>
    </div>

    <p>Already have an account?
        <a href="{{ url_for('login') }}">Login</a>
    </p>
</div>

<script>
document.getElementById('registerForm').addEventListener('submit', function(event) {
    const email = document.getElementById('email').value.trim();
    const password = document.getElementById('password').value;
    const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;

    if (!emailRegex.test(email)) {
        alert('Please enter a valid email address.');
        event.preventDefault();
        return;
    }

    if (password.length < 8) {
        alert('Password must be at least 8 characters long.');
        event.preventDefault();
    }
});
</script>

</body>
</html>

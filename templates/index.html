<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Website Phishing URL Detection</title>

    <!-- Bootstrap -->
    <link rel="stylesheet"
          href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.0/css/bootstrap.min.css">

    <!-- Custom CSS -->
    <link rel="stylesheet"
          href="{{ url_for('static', filename='style.css') }}">
</head>

<body>

<div class="container">
    <div class="row">

        <!-- FORM -->
        <div class="col-md-6">
            <h2 class="mb-4 text-center">
                WEBSITE PHISHING URL DETECTION
            </h2>

            <form action="/" method="post">
                <input type="text"
                       class="form__input"
                       name="url"
                       placeholder="Enter URL"
                       required>

                <label class="form__label">URL</label>

                <button type="submit" class="button mt-3">
                    Check here
                </button>

                <button type="button" class="button mt-3" onclick="window.location.href='/'">
                Reset
                </button>
            </form>
        </div>

       <!-- RESULT -->
<div class="col-md-6 mt-4 text-center">

    {% if url and prediction %}

        <p><strong>Entered URL:</strong><br>{{ url }}</p>

        {% if xx == 1 %}
            <h3 class="confidence safe">
                {{ prediction }}
            </h3>
            <button class="button1 mt-3">Continue</button>
        {% else %}
            <h3 class="confidence phishing">
                {{ prediction }}
            </h3>
            <button class="button2 mt-3">Still want to continue</button>
        {% endif %}

    {% endif %}

</div>

    </div>

    <p class="mt-4">©2026 Team Apex</p>
</div>

</body>
</html>
